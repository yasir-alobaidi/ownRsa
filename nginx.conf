server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Next static export uses folder-style routes (e.g. /request/index.html)
    # because trailingSlash is true, so a plain try_files is all we need.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
