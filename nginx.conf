server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trust Cloudflare's edge as a reverse proxy so $remote_addr (and the
    # X-Real-IP / X-Forwarded-For we hand to the API) is the real visitor,
    # not Cloudflare's own IP -- otherwise every visitor behind Cloudflare
    # would look like the same handful of IPs to the API's rate limiter.
    # Ranges from https://www.cloudflare.com/ips/ -- Cloudflare adds ranges
    # occasionally, so re-check this list periodically.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/ttf font/otf application/vnd.ms-fontobject;

    # nginx quirk: `add_header` in a location block does not merge with the
    # server-level ones above it -- it replaces them for that block entirely.
    # So every location below that sets its own Cache-Control repeats these
    # four explicitly rather than relying on inheriting them from here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # Next static-exports this with no file extension, so nginx can't infer
    # the type from the filename the way it does for everything else.
    location = /opengraph-image {
        default_type image/png;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    }

    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js content-hashes these filenames, so they're safe to cache "forever".
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        try_files $uri =404;
    }

    # Everything else (HTML, robots.txt, sitemap.xml, favicon) should
    # revalidate on every request so deploys show up immediately.
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        # The bare "=404" (not a /404.html path) is what makes this a real
        # nginx error rather than an internal redirect to a file that exists
        # on disk -- otherwise try_files serves 404.html's content with a
        # 200, a "soft 404" that search engines treat as a real, indexable
        # page instead of recognizing the URL as gone.
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    }
}
