services:
  web:
    # Auto-loaded by plain `docker compose up` (local dev), never by the
    # server's explicit `-f docker-compose.yml -f docker-compose.prod.yml`
    # deploy command -- so this has zero effect on production. Swaps in the
    # HTTP-only nginx config since there's no Let's Encrypt cert locally; see
    # nginx.local.conf for why.
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
